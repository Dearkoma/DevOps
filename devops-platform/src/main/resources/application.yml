server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: devops-platform

  datasource:
    url: jdbc:mysql://localhost:3306/devops_platform?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: Dearkoma.962464
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
        jdbc:
          batch_size: 20
    open-in-view: false

  websocket:
    allowed-origins: "*"

logging:
  level:
    com.devops: INFO
    org.springframework: INFO
    org.hibernate.SQL: WARN
  file:
    name: ./cddata/logs/devops-platform.log

# DevOps 平台自定义配置
devops:
  pipeline:
    workspace-dir: ./data/workspace
    log-dir: ./data/logs
    # 模拟模式（true=不执行真实命令，用延迟模拟；false=真正执行 Shell/Docker/kubectl 命令）
    simulation-mode: false
    # Shell 执行器（Windows 用 "cmd /c"，Linux/Mac 用 "bash -c"）
    shell:
      command: cmd /c
    # Docker 镜像仓库地址（为空则使用本地镜像名）
    docker:
      registry: ""
      # Docker 命令（docker / nerdctl / podman）
      # Rancher Desktop 开启 moby 容器引擎后直接用 docker
      command: docker
      # Docker 不可用时是否跳过该阶段（true=跳过并继续, false=标记构建失败）
      skip-if-unavailable: true
    # K8s 部署配置
    k8s:
      # 是否启用 K8s 集成（false 时跳过连接检测）
      enabled: true
      # 部署命名空间
      namespace: devops
      # kubectl 不可用时是否跳过该阶段（true=跳过并继续, false=标记构建失败）
      skip-if-unavailable: true
      # 宿主机 IP（K8s Pod 内访问宿主机 MySQL 等服务的地址）
      # auto = 自动检测（WSL: 网关IP, Docker Desktop: host.docker.internal）
      # 也可以手动指定，如: 172.24.176.1 或 host.docker.internal
      host-ip: auto
      # kubeconfig 文件路径（留空则自动搜索: KUBECONFIG环境变量 > ~/.kube/config > ~/.rancher/kube/config）
      # Windows Rancher 用户: 从 Rancher UI 下载 kubeconfig 放到 C:\Users\<用户名>\.kube\config 即可
      kubeconfig-path:
    # 单步执行超时时间（毫秒，默认 10 分钟）
    timeout-ms: 600000
  # JWT
  jwt:
    secret: ZGV2b3BzLXBsYXRmb3JtLWp3dC1zZWNyZXQta2V5LTIwMjYtMDEtMDEtc3VwZXItc2VjdXJl
    expiration: 86400000  # 24 小时（毫秒）

  # 默认登录
  admin:
    default-username: admin
    default-password: admin123
    default-email: admin@devops.local
